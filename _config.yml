title: "OpenClaw Personal AI Agent"
description: "Security-hardened, defence-in-depth deployment guide for self-hosted AI agents on WSL2 Ubuntu — with five-layer observability"
url: "https://vishal8shah.github.io"
baseurl: "/openclaw-personal-ai-agent"

# ---- Theme ----
remote_theme: just-the-docs/just-the-docs@v0.8.2
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-include-cache

# ---- just-the-docs settings ----
color_scheme: openclaw

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  rel_url: true
  button: false

# Aux links (top-right)
aux_links:
  "GitHub ↗":
    - "https://github.com/vishal8shah/openclaw-personal-ai-agent"
aux_links_new_tab: true

# Footer
footer_content: "Built through real deployment. Every error was real. Every fix was tested."

# Back to top
back_to_top: true
back_to_top_text: "↑ Top"

# Heading anchors
heading_anchors: true

# ---- SEO ----
author: "Vishal Shah"

# ---- Markdown ----
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

# ---- Exclude ----
exclude:
  - Gemfile
  - Gemfile.lock
  - scripts/
  - config/
  - workspace/
  - "*.sh"
  - .gitignore
  - LICENSE
  - "*.example"
